<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>美国 / 全球市场 QDII 基金卡片看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell cards-shell">
      <header class="topbar compact-topbar">
        <div>
          <p class="eyebrow">QDII Fund Monitor</p>
          <h1>美国 / 全球市场 QDII 基金看板</h1>
          <p class="subtitle">左侧按方向分类，中间用卡片看收益率、限购金额和申购状态；更多费率和报告点击卡片查看。</p>
        </div>
        <div class="actions">
          <a class="button" href="./data/qdii-funds.csv">导出 CSV</a>
          <a class="button muted" href="https://fund.eastmoney.com/data/fundranking.html" target="_blank" rel="noreferrer">数据源</a>
        </div>
      </header>

      <section class="summary cards-summary" aria-label="统计概览">
        <div class="metric">
          <span>目标基金总数</span>
          <strong id="countAll">--</strong>
        </div>
        <div class="metric">
          <span>纳指相关</span>
          <strong id="countNasdaq">--</strong>
        </div>
        <div class="metric">
          <span>标普相关</span>
          <strong id="countSp">--</strong>
        </div>
        <div class="metric">
          <span>场内 ETF</span>
          <strong id="countEtf">--</strong>
        </div>
        <div class="metric">
          <span>有限额</span>
          <strong id="countLimited">--</strong>
        </div>
      </section>

      <section class="card-controls" aria-label="筛选">
        <label class="search card-search">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="输入代码、基金名称、拼音" />
        </label>
        <label>
          <span>币种</span>
          <select id="currencyFilter"><option value="">全部</option></select>
        </label>
        <label>
          <span>申购状态</span>
          <select id="statusFilter"><option value="">全部</option></select>
        </label>
        <label class="toggle card-toggle">
          <input id="limitOnly" type="checkbox" />
          <span>仅看有限额</span>
        </label>
      </section>

      <section class="cards-layout" aria-label="基金卡片列表">
        <aside class="category-panel">
          <div class="category-title">基金分类</div>
          <div id="categoryList" class="category-list"></div>
        </aside>

        <section class="cards-main">
          <div class="cards-head">
            <div>
              <p id="resultCount">--</p>
              <strong id="activeCategoryTitle">全部基金</strong>
            </div>
            <span>点击卡片查看费率、报告、基金主页等二级信息</span>
          </div>
          <div id="fundCards" class="fund-cards"></div>
        </section>
      </section>

      <footer class="site-footer cards-footer">
        <p id="meta" class="meta">正在读取数据...</p>
      </footer>
    </main>

    <script src="./app.js?v=20260526-card-view" type="module"></script>
  </body>
</html>
